server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: geotext-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/geotext}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  mvc:
    async:
      request-timeout: 180000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
  storage:
    root: ${DOCUMENT_STORAGE_ROOT:uploads/documents}
  jwt:
    secret: ${JWT_SECRET:change-this-phase-one-secret-before-production-2026}
    ttl: ${JWT_TTL:PT8H}
  one-map:
    webhook-url: ${ONE_MAP_WEBHOOK_URL:}
